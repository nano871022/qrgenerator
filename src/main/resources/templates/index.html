<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Custom QR Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-label { font-weight: bold; }
        .strategy-fields { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Custom QR Generator</h2>
    <form th:action="@{/generate}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="content" class="form-label">Content (URL/Text)</label>
            <input type="text" class="form-control" id="content" name="content" placeholder="https://example.com" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="size" class="form-label">Size (px)</label>
                <input type="number" class="form-control" id="size" name="size" value="400" step="50" min="100" max="2000">
            </div>
            <div class="col-md-6 mb-3">
                <label for="moduleStyle" class="form-label">Module Style</label>
                <select class="form-select" id="moduleStyle" name="moduleStyle">
                    <option value="square">Square</option>
                    <option value="circle">Circle</option>
                    <option value="rounded">Rounded</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label for="finderStyle" class="form-label">Finder Style</label>
            <select class="form-select" id="finderStyle" name="finderStyle">
                <option value="square">Square</option>
                <option value="rounded">Rounded</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="colorStrategy" class="form-label">Color Strategy</label>
            <select class="form-select" id="colorStrategy" name="colorStrategy" onchange="toggleColorFields()">
                <option value="solid">Solid Color</option>
                <option value="gradient">Gradient</option>
                <option value="image">Background Image Mapping</option>
            </select>
        </div>

        <!-- Solid Color Field -->
        <div id="solid-fields" class="mb-3 strategy-fields" style="display: block;">
            <label for="solidColor" class="form-label">Color</label>
            <input type="color" class="form-control form-control-color" id="solidColor" name="solidColor" value="#000000">
        </div>

        <!-- Gradient Fields -->
        <div id="gradient-fields" class="strategy-fields">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="gradientStart" class="form-label">Start Color</label>
                    <input type="color" class="form-control form-control-color" id="gradientStart" name="gradientStart" value="#000000">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="gradientEnd" class="form-label">End Color</label>
                    <input type="color" class="form-control form-control-color" id="gradientEnd" name="gradientEnd" value="#4A90E2">
                </div>
            </div>
        </div>

        <!-- Image Mapping Field -->
        <div id="image-fields" class="mb-3 strategy-fields">
            <label for="bgImage" class="form-label">Template Image</label>
            <input class="form-control" type="file" id="bgImage" name="bgImage" accept="image/*">
        </div>

        <hr>

        <div class="mb-3">
            <label for="logo" class="form-label">Logo Overlay (Optional)</label>
            <input class="form-control" type="file" id="logo" name="logo" accept="image/*">
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="logoRatio" class="form-label">Logo Ratio (0.1 - 0.3)</label>
                <input type="number" class="form-control" id="logoRatio" name="logoRatio" value="0.2" step="0.05" min="0.1" max="0.3">
            </div>
            <div class="col-md-6 mb-3 pt-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="quietZone" name="quietZone" checked>
                    <label class="form-check-label" for="quietZone">Quiet Zone</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Generate & Download QR</button>
    </form>
</div>

<script>
    function toggleColorFields() {
        const strategy = document.getElementById('colorStrategy').value;
        document.querySelectorAll('.strategy-fields').forEach(el => el.style.display = 'none');

        if (strategy === 'solid') {
            document.getElementById('solid-fields').style.display = 'block';
        } else if (strategy === 'gradient') {
            document.getElementById('gradient-fields').style.display = 'block';
        } else if (strategy === 'image') {
            document.getElementById('image-fields').style.display = 'block';
        }
    }
</script>

</body>
</html>
